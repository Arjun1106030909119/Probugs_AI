<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBugs - Report a Bug</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="app" class="container">
        <!-- Main Form View -->
        <div id="form-view" class="view">
            <header class="header">
                <div class="header-left">
                    <svg class="header-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L4 20H20L12 2Z" fill="currentColor" />
                        <path d="M12 9V13" stroke="white" stroke-width="2" stroke-linecap="round" />
                        <path d="M12 16V16.01" stroke="white" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <h1>Report a Bug</h1>
                </div>
                <span class="version">v1.2.0</span>
            </header>

            <main class="content">
                <div class="form-group">
                    <label>SOURCE URL</label>
                    <div class="url-input-wrapper">
                        <input type="text" id="source-url" value="https://www.example.com/current-page" readonly>
                        <svg class="lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label>BUG TITLE</label>
                    <input type="text" id="bug-title" placeholder="Summarize the issue...">
                </div>

                <div class="form-group">
                    <label>SEVERITY</label>
                    <select id="severity">
                        <option value="Low">Low - Minor aesthetic issue</option>
                        <option value="Medium" selected>Medium - Feature not working as expected</option>
                        <option value="High">High - Critical functional failure</option>
                        <option value="Urgent">Urgent - System wide outage</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>DESCRIPTION</label>
                    <textarea id="description" placeholder="What happened? Steps to reproduce..."></textarea>
                </div>

                <div class="actions">
                    <button id="submit-btn" class="btn-primary">
                        Submit Report 
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                    <button id="cancel-btn" class="btn-text">Cancel</button>
                </div>
            </main>

            <footer class="footer">
                <div class="user-info">LOGGED IN AS DEVMODE_USER</div>
                <div class="status">
                    <span class="status-dot"></span>
                    System Online
                </div>
            </footer>
        </div>

        <!-- Success View -->
        <div id="success-view" class="view hidden">
            <header class="header bg-white shadow-sm">
                <div class="header-left">
                    <img src="icons/icon48.png" alt="ProBugs" class="logo-sm">
                    <h1 class="text-dark">Bug Tracker</h1>
                </div>
                <div class="header-actions">
                    <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    <svg class="icon-btn close-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </header>
            
            <main class="content-success">
                <div class="success-icon-wrapper">
                    <div class="success-circle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                </div>
                
                <h2>Report Submitted!</h2>
                <p>Thank you for helping us improve. Our team will review your report shortly.</p>
                
                <div class="ticket-id">
                    TICKET ID: <span>#BT-88294</span>
                </div>
                
                <div class="success-actions">
                    <button id="report-another-btn" class="btn-orange">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Report Another Bug
                    </button>
                    <a href="#" id="visit-btn" class="link-secondary">Visit Website</a>
                    <a href="#" class="link-text">View My Open Reports</a>
                </div>
            </main>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
